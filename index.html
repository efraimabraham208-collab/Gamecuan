<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slot Game</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(to bottom, #09090f, #111827);
      overflow-x: hidden;
    }

    .slot-box {
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.08);
      border: 2px solid #9333ea;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      box-shadow: 0 0 20px rgba(147,51,234,.5);
    }

    .glow {
      box-shadow: 0 0 25px rgba(168,85,247,.7);
    }
  </style>
</head>

<body class="text-white min-h-screen flex items-center justify-center p-6">

  <div class="max-w-xl w-full text-center">

    <h1 class="text-5xl font-black text-purple-400 mb-4">
      SLOT GAME
    </h1>

    <p class="text-gray-300 mb-10">
      Demo game slot sederhana untuk hiburan.
    </p>

    <div class="flex justify-center gap-4 mb-10">
      <div id="slot1" class="slot-box">🎰</div>
      <div id="slot2" class="slot-box">🎰</div>
      <div id="slot3" class="slot-box">🎰</div>
    </div>

    <button
      onclick="spin()"
      class="bg-purple-600 hover:bg-purple-700 px-10 py-4 rounded-2xl text-xl font-bold glow"
    >
      SPIN
    </button>

    <div id="result" class="mt-8 text-2xl font-bold"></div>

  </div>

  <script>
    const items = ["🍒", "💎", "⭐", "🔥", "7️⃣", "🍀"];

    function randomItem() {
      return items[Math.floor(Math.random() * items.length)];
    }

    function spin() {
      const slot1 = document.getElementById("slot1");
      const slot2 = document.getElementById("slot2");
      const slot3 = document.getElementById("slot3");
      const result = document.getElementById("result");

      result.innerHTML = "Memutar...";

      let count = 0;

      const interval = setInterval(() => {
        slot1.innerHTML = randomItem();
        slot2.innerHTML = randomItem();
        slot3.innerHTML = randomItem();

        count++;

        if (count > 15) {
          clearInterval(interval);

          const a = randomItem();
          const b = randomItem();
          const c = randomItem();

          slot1.innerHTML = a;
          slot2.innerHTML = b;
          slot3.innerHTML = c;

          if (a === b && b === c) {
            result.innerHTML = "🎉 JACKPOT 🎉";
            result.className = "mt-8 text-3xl font-black text-green-400";
          } else {
            result.innerHTML = "Coba Lagi";
            result.className = "mt-8 text-2xl font-bold text-red-400";
          }
        }
      }, 100);
    }
  </script>

</body>
</html>
