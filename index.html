<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slot Kartu</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:linear-gradient(to bottom,#0f172a,#020617);
      overflow:hidden;
      font-family:Arial;
    }

    .card-slot{
      width:110px;
      height:150px;
      background:white;
      color:black;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:50px;
      font-weight:bold;
      box-shadow:0 0 20px rgba(255,255,255,.4);
      transition:.3s;
    }

    .glow{
      box-shadow:0 0 30px rgba(168,85,247,.8);
    }

    .btn{
      background:#7c3aed;
      padding:14px 40px;
      border-radius:18px;
      font-size:22px;
      font-weight:bold;
      transition:.3s;
    }

    .btn:hover{
      background:#6d28d9;
      transform:scale(1.05);
    }
  </style>
</head>

<body class="text-white flex items-center justify-center min-h-screen p-6">

<div class="text-center max-w-2xl w-full">

  <h1 class="text-6xl font-black text-purple-400 mb-4">
    SLOT KARTU
  </h1>

  <p class="text-gray-300 mb-10 text-lg">
    Cocokkan kartu dan raih JACKPOT!
  </p>

  <div class="flex justify-center gap-5 mb-10">

    <div id="slot1" class="card-slot">🂡</div>
    <div id="slot2" class="card-slot">🂡</div>
    <div id="slot3" class="card-slot">🂡</div>

  </div>

  <button onclick="spin()" class="btn glow">
    SPIN
  </button>

  <div id="coin" class="mt-8 text-2xl font-bold text-yellow-400">
    COIN: 100
  </div>

  <div id="result" class="mt-6 text-3xl font-black"></div>

</div>

<script>

const cards = [
  "🂡","🂱","🃁","🃑",
  "🂮","🂭","🂫","🂪"
];

let coin = 100;

function randomCard(){
  return cards[Math.floor(Math.random()*cards.length)];
}

function spin(){

  if(coin <= 0){
    document.getElementById("result").innerHTML =
    "COIN HABIS";
    return;
  }

  coin -= 10;

  document.getElementById("coin").innerHTML =
  "COIN: " + coin;

  const s1 = document.getElementById("slot1");
  const s2 = document.getElementById("slot2");
  const s3 = document.getElementById("slot3");

  const result = document.getElementById("result");

  result.innerHTML = "MEMUTAR...";

  let count = 0;

  const interval = setInterval(()=>{

    s1.innerHTML = randomCard();
    s2.innerHTML = randomCard();
    s3.innerHTML = randomCard();

    count++;

    if(count > 15){

      clearInterval(interval);

      const a = randomCard();
      const b = randomCard();
      const c = randomCard();

      s1.innerHTML = a;
      s2.innerHTML = b;
      s3.innerHTML = c;

      if(a === b && b === c){

        coin += 100;

        document.getElementById("coin").innerHTML =
        "COIN: " + coin;

        result.innerHTML =
        "🎉 JACKPOT +100 COIN 🎉";

        result.className =
        "mt-6 text-4xl font-black text-green-400";

      }else{

        result.innerHTML =
        "Coba Lagi";

        result.className =
        "mt-6 text-3xl font-black text-red-400";
      }
    }

  },100);
}

</script>

</body>
</html>
